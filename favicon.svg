<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="wolf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#d4c4ff"/>
      <stop offset="100%" stop-color="#9c80f0"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.45" r="0.7">
      <stop offset="0%"  stop-color="#1a1230"/>
      <stop offset="100%" stop-color="#07070d"/>
    </radialGradient>
  </defs>

  <!-- dark tile + faint cyan rim -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="5.5"
        fill="none" stroke="#41e3e0" stroke-opacity="0.35" stroke-width="1"/>

  <!-- pixel wolf head (each "pixel" = 2x2 SVG units, 10x10 grid centered) -->
  <g fill="url(#wolf)">
    <!-- ear tips -->
    <rect x="6"  y="6"  width="4"  height="2"/>
    <rect x="22" y="6"  width="4"  height="2"/>
    <!-- ears widening -->
    <rect x="6"  y="8"  width="6"  height="2"/>
    <rect x="20" y="8"  width="6"  height="2"/>
    <!-- top of head -->
    <rect x="6"  y="10" width="20" height="2"/>
    <!-- eye band: outer edges + center bridge (gaps = eyes) -->
    <rect x="6"  y="12" width="2"  height="4"/>
    <rect x="12" y="12" width="8"  height="4"/>
    <rect x="24" y="12" width="2"  height="4"/>
    <!-- below eyes -->
    <rect x="6"  y="16" width="20" height="2"/>
    <!-- jaw tapering to chin -->
    <rect x="8"  y="18" width="16" height="2"/>
    <rect x="10" y="20" width="12" height="2"/>
    <rect x="12" y="22" width="8"  height="2"/>
    <rect x="14" y="24" width="4"  height="2"/>
  </g>

  <!-- glowing cyan eyes -->
  <g fill="#41e3e0">
    <rect x="8"  y="12" width="4" height="4"/>
    <rect x="20" y="12" width="4" height="4"/>
  </g>
</svg>
