<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ff5cf0"/>
      <stop offset="100%" stop-color="#b69dff"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.45" r="0.7">
      <stop offset="0%"  stop-color="#1a1230"/>
      <stop offset="100%" stop-color="#07070d"/>
    </radialGradient>
  </defs>

  <!-- dark rounded tile + faint cyan rim (Silver Wolf palette) -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="5.5"
        fill="none" stroke="#41e3e0" stroke-opacity="0.35" stroke-width="1"/>

  <!-- 8-bit pixel heart (each "pixel" = 2x2 SVG units) -->
  <g fill="url(#heart)">
    <rect x="9"  y="8"  width="4"  height="2"/>
    <rect x="19" y="8"  width="4"  height="2"/>
    <rect x="7"  y="10" width="8"  height="2"/>
    <rect x="17" y="10" width="8"  height="2"/>
    <rect x="7"  y="12" width="18" height="4"/>
    <rect x="9"  y="16" width="14" height="2"/>
    <rect x="11" y="18" width="10" height="2"/>
    <rect x="13" y="20" width="6"  height="2"/>
    <rect x="15" y="22" width="2"  height="2"/>
  </g>

  <!-- tiny cyan "hacked" highlight pixel on the heart -->
  <rect x="11" y="12" width="2" height="2" fill="#7af0ee"/>
</svg>
