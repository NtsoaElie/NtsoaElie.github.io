<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  PORTFOLIO · "Silver Wolf LV.999 — Solo Maxxing" theme             ║
  ║                                                                    ║
  ║  This file is just the SHELL (structure). You almost never edit    ║
  ║  it. To update your content, open:   js/data.js                    ║
  ║                                                                    ║
  ║  Project map                                                       ║
  ║   index.html ......... structure (this file)                       ║
  ║   js/data.js ......... ✦ YOUR CONTENT — edit this ✦                ║
  ║   js/render.js ....... builds the page from data.js                ║
  ║   js/effects.js ...... animations & interactions                  ║
  ║   css/tokens.css ..... colors / fonts / spacing (theme knobs)      ║
  ║   css/*.css .......... base · layout · components · animations     ║
  ║                                                                    ║
  ║  EASTER EGG: type the Konami code (↑↑↓↓←→←→ B A) for DEV MODE.      ║
  ║  No build step. Best served locally (see README) or deploy folder. ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SW.999 — Solo Maxxing · Developer Portfolio</title>
  <meta name="description" content="Level 999 developer portfolio — solo maxxing the stack." />

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- styles (order matters: tokens → base → layout → components → animations → responsive) -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <!-- ambient / CRT overlays + toast mount (filled by JS) -->
  <div class="scan"></div>
  <div class="crt"></div>
  <div id="toasts"></div>

  <!-- boot sequence overlay (text injected by effects.js) -->
  <div id="boot">
    <div class="boot-box">
      <div class="ln" id="b0"></div>
      <div class="ln" id="b1"></div>
      <div class="ln" id="b2"></div>
      <div class="bar"><i id="bbar"></i></div>
      <div class="ln" id="b3"></div>
      <div class="boot-skip">[ click or press any key to skip ]</div>
    </div>
  </div>

  <!-- nav (brand + links injected by render.js) -->
  <nav id="nav">
    <a href="#top" class="brand" data-brand></a>
    <button class="lang-toggle" id="langToggle" type="button" aria-label="Switch language">[ FR ]</button>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">[ ≡ ]</button>
    <div class="nav-links" id="navLinks"></div>
  </nav>

  <!-- page content: each section is filled from js/data.js by render.js -->
  <main>
    <section class="hero" id="top" data-render="hero" aria-label="Intro"></section>
    <section id="about"    data-render="about"></section>
    <section id="skills"   data-render="skills"></section>
    <section id="projects" data-render="projects"></section>
    <section id="contact"  class="contact" data-render="contact"></section>
  </main>

  <footer data-render="footer"></footer>

  <!-- scripts (order matters: data → render → effects) -->
  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/effects.js"></script>
</body>
</html>
